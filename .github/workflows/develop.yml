name: CI/CD Pipeline

on:
  push:
    branches:
      - feature/#1 #main브랜치
  pull_request:
    branches:
      - feature/#1 #main브랜치

jobs:
  build:
    #main에 push될 때 docker 이미지 빌드하고 amazon ECR로 푸시
    name: Build Docker image and push to ECR
    runs-on: ubuntu-latest

    steps:
      # 코드 체크아웃
      - name: Checkout repository
        uses: actions/checkout@v4

      # JDK 설치
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      # Gradle Build
      - name: Build with Gradle
        run: ./gradlew build

      # DockerHub 로그인
      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_ACCESS_TOKEN }}

      # DockerHub Build
      - name: Build and Push Docker image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/sss_team7:latest .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/sss_team7:latest
  

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      # AWS 배포. SSH를 통해 EC2 인스턴스에 접속하여 애플리케이션 배포
      - name: SSH to EC2 and deploy
        uses: appleboy/ssh-action@v0.1.3
        with:
          #EC2 접속
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}

          #
          script: |
            sudo docker kill sss_team7:latest
            sudo docker rm -f sss_team7:latest
            sudo docker rmi ${{ secrets.DOCKERHUB_USERNAME }}/sss_team7:latest
            sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/sss_team7:latest

            sudo docker run -p ${{ secrets.PORT }}:${{ secrets.PORT }} \
            --name sss_team7:latest\
            -e SPRING_DATASOURCE_URL=${{ secrets.DB_JDBC_URL }} \
            -e SPRING_DATASOURCE_USERNAME=${{ secrets.DB_USER_NAME }} \
            -e SPRING_DATASOURCE_PASSWORD=${{ secrets.DB_PASSWORD }} \
            -d ${{ secrets.DOCKERHUB_USERNAME }}/sss_team7:latest