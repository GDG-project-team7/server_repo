#11
name: CI/CD Pipeline

on:
  push:
    branches:
      - feature/#35
  pull_request:
    branches:
      - feature/#35

jobs:
  deploy:
    name: Build Docker image and push
    runs-on: ubuntu-latest
    env:
      DB_JDBC_URL: ${{ secrets.RDS_DB_URL }}  # RDS의 URL을 GitHub Secrets에서 가져옴
      DB_USER_NAME: ${{ secrets.RDS_DB_USER }}  # RDS 사용자명
      DB_PASSWORD: ${{ secrets.RDS_DB_PASSWORD }}  # RDS 비밀번호
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Gradle
        run: chmod +x ./gradlew

      - name: Build
        run: ./gradlew build

      - name: AWS 인증
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-region: ap-northeast-2
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Log in to Amazon ECR
        id: login-ecr
        # aws에서 공식적으로 제공하는 Github Actions 플러그인.
        uses: aws-actions/amazon-ecr-login@v2

        # CLI 명령어 직접 실행하여 ECR에 로그인 하는 방식
        # uses: aws-actions/amazon-ecr-login@v2

      - name: Docker image create
        run: docker build -t sss_team7 -f build/libs/Dockerfile .

      - name: Docker image tagging
        run: docker tag sss_team7:latest ${{ secrets.AWS_ECR_REGISTRY }}:latest

      - name: Push Docker image to ECR
        run: docker push ${{ secrets.AWS_ECR_REGISTRY }}:latest

      - name: SSH into EC2 and deploy Docker image
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_PUBLIC_IP }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          script_stop: true
          script: |
            # ECR 로그인 다시 시도
            docker login -u AWS -p $(aws ecr get-login-password --region ap-northeast-2) ${{ secrets.AWS_ECR_REGISTRY }}

            # 마지막으로 ECR에서 가져온 Docker 이미지 실행시키면 배포가 끝난다.
            # 기존 Docker 컨테이너 중지 및 삭제
            docker stop hipple-app || true
            docker rm hipple-app || true

            # 새로운 Docker 이미지 다운로드 및 실행
            docker pull ${{ steps.AWS_ECR_REGISTRY }}
            docker run -d --name hipple-app -p 8080:8080 ${{ secrets.AWS_ECR_REGISTRY }}
