name: CI/CD Pipeline

on:
  push:
    branches:
      - feature/#1 #main브랜치
  pull_request:
    branches:
      - feature/#1 #main브랜치

jobs:
  build:
    name: Build Docker image and push
    runs-on: ubuntu-latest

    steps:
      # 코드 체크아웃
      - name: Checkout repository
        uses: actions/checkout@v4

      # JDK 설치
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      # Gradle Build - 실행 권한 부여
      - name: Gradle
        run: chmod +x ./gradlew

      #테스트 및 빌드하기
      - name: Build
        run: ./gradlew clean build

      # DockerHub 로그인
      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_ACCESS_TOKEN }}


      # DockerHub Build - 이미지 생성, Docker 이미지에 Tag 붙이고, push
      - name: Build and Push Docker image
        run: |
          docker build -t sss_team7:latest .
          docker tag sss_team7:latest ${{ secrets.DOCKERHUB_USERNAME }}/sss_team7:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/sss_team7:latest
  

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      # AWS 배포. SSH를 통해 EC2 인스턴스에 접속하여 애플리케이션 배포
      - name: SSH to EC2 and deploy
        uses: appleboy/ssh-action@v0.1.3
        with:
          #EC2 접속(로그인 한 후. 최신 이미지 가져오고 새로운 컨테이너 실행)
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script:
             sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/sss_team7:latest
                  docker run -d --rm \
                    --name sss_team7 \
                    -p ${{ secrets.PORT }}:${{ secrets.PORT }} \
                    -e SPRING_DATASOURCE_URL=${{ secrets.DB_JDBC_URL }} \
                    -e SPRING_DATASOURCE_USERNAME=${{ secrets.DB_USER_NAME }} \
                    -e SPRING_DATASOURCE_PASSWORD=${{ secrets.DB_PASSWORD }} \
                    --restart unless-stopped \
                    ${{ secrets.DOCKERHUB_USERNAME }}/sss_team7:latest